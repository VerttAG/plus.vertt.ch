<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found | Vertt</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="two-column" style="min-height: 70vh; align-items: center;">
        <div>
          <p class="eyebrow">404</p>
          <h1 style="font-size: clamp(2.6rem, 7vw, 5rem); max-width: 12ch;">
            This page does not exist.
          </h1>
        </div>
        <div class="checklist">
          <p>The URL may be wrong, or the page may have moved.</p>
          <p><a href="./index.html">Return to the homepage</a></p>
        </div>
      </main>
    </div>
  </body>
